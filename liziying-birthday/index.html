<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>李子莹 21 岁生日快乐</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <canvas id="fireworks" aria-hidden="true"></canvas>

    <div class="petals" aria-hidden="true">
      <span class="petal p1"></span>
      <span class="petal p2"></span>
      <span class="petal p3"></span>
      <span class="petal p4"></span>
      <span class="petal p5"></span>
      <span class="petal p6"></span>
      <span class="petal p7"></span>
      <span class="petal p8"></span>
      <span class="petal p9"></span>
      <span class="petal p10"></span>
    </div>

    <main class="page">
      <section class="hero">
        <div class="intro">
          <p class="eyebrow">For Li Ziying</p>
          <h1>21 岁生日快乐</h1>
          <p class="subtitle">
            愿玫瑰、烛光、星火与偏爱，在这一年都刚好落在你身上。
          </p>

          <div class="badge-row">
            <span class="badge">Birthday Cake</span>
            <span class="badge">Rose Garden</span>
            <span class="badge">Firework Night</span>
          </div>

          <div class="actions">
            <button id="surpriseButton" class="primary-button" type="button">
              点一下放烟花
            </button>
            <button id="pulseButton" class="secondary-button" type="button">
              切换心动模式
            </button>
          </div>

          <p id="statusText" class="status-text">
            今天的主角，是李子莹和这场专属她的生日夜晚。
          </p>
        </div>

        <div class="showcase" aria-hidden="true">
          <div class="halo halo-a"></div>
          <div class="halo halo-b"></div>
          <div class="cake-card">
            <div class="cake">
              <div class="candles">
                <span class="candle"><i class="flame"></i></span>
                <span class="candle"><i class="flame"></i></span>
                <span class="candle"><i class="flame"></i></span>
                <span class="candle"><i class="flame"></i></span>
              </div>
              <div class="cake-top"></div>
              <div class="cake-middle"></div>
              <div class="cake-base"></div>
              <div class="cake-plate"></div>
            </div>
            <div class="rose rose-left">
              <span class="bloom"></span>
              <span class="stem"></span>
            </div>
            <div class="rose rose-right">
              <span class="bloom"></span>
              <span class="stem"></span>
            </div>
          </div>
        </div>
      </section>

      <section class="letter-section">
        <div class="letter-header">
          <div>
            <p class="letter-kicker">给她的信</p>
            <h2>把你想说的话写在这里</h2>
          </div>
          <button id="saveButton" class="save-button" type="button">保存情书</button>
        </div>

        <textarea id="letterInput" class="letter-input" spellcheck="false">
宝宝21岁生日快乐，希望你以后每天都开开心心，快快乐乐的。我虽然有时候会惹你生气，但是每次哄你也总愿意给我台阶，希望我们俩以后一直开开心心的，不吵架不分开，能一起脚踏实地一步一步走下去，和你在一起很幸福，你是一个可爱又有一些幽默的宝宝，随着时间的流逝我们俩越来越熟络，越来越能看见你最真实的一面，你温柔大方，大人不计小人过，每次都说要揍我最后也没有舍得对我动手，还总是迁就我，又给我买这买哪花钱不眨眼。希望未来我们俩继续努力，共赴美好明天。
        </textarea>

        <p class="letter-tip">
          这段文字会自动保存在当前浏览器里，手机和平板打开后也能继续修改。
        </p>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
